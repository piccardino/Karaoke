<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Night 🎤</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="three-container"></div>

    <div id="app-container">
        <header>
            <h1>🎤 Karaoke Night</h1>
            <div id="room-indicator" class="hidden"></div>
        </header>

        <div id="room-section">
            <div id="room-controls">
                <button id="btn-create-room" class="room-btn primary">➕ Create Room</button>
                <div id="join-room-wrapper">
                    <input type="text" id="room-input" placeholder="Room ID..." maxlength="8">
                    <button id="btn-join-room" class="room-btn">🔗 Join Room</button>
                </div>
            </div>
            <div id="invite-display" class="hidden">
                <p>📨 Invite link: <span id="invite-link"></span></p>
                <button id="btn-copy-link">📋 Copy</button>
                <p id="guest-status">Waiting for guests...</p>
            </div>
        </div>

        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search for songs on YouTube...">
            <label id="karaoke-toggle" class="toggle-switch">
                <input type="checkbox" id="karaoke-mode">
                <span class="toggle-slider">+Karaoke</span>
            </label>
            <button id="search-button">Search</button>
        </div>

        <div id="results-container" class="hidden"></div>

        <div id="player-container" class="hidden">
            <div id="player-header">
                <div id="now-playing">
                    <h2 id="song-title" style="cursor: pointer;" title="Click to go back to home"></h2>
                    <p id="song-artist"></p>
                </div>
                <button id="btn-toggle-player" title="Show/Hide Player">🎬</button>
            </div>
            <div id="player-content">
                <audio id="local-audio" controls style="width:100%;margin-bottom:10px;"></audio>
                <div id="controls">
                    <button id="btn-play">▶ Play</button>
                    <button id="btn-pause">⏸ Pause</button>
                    <button id="btn-stop">⏹ Stop</button>
                </div>
                <div id="audio-controls">
                    <div class="eq-control">
                        <label>🎤 Vocal</label>
                        <input type="range" id="vocal-volume" min="0" max="100" value="100">
                        <span id="vocal-value">100%</span>
                    </div>
                    <div class="eq-control">
                        <label>🎵 Music</label>
                        <input type="range" id="music-volume" min="0" max="100" value="100">
                        <span id="music-value">100%</span>
                    </div>
                    <div class="eq-control">
                        <label>🔊 Bass</label>
                        <input type="range" id="bass-volume" min="0" max="100" value="100">
                        <span id="bass-value">100%</span>
                    </div>
                    <button id="btn-karaoke-mode" class="karaoke-eq-btn" title="Reduce vocals for karaoke">🎤 Karaoke Mode</button>
                    <button id="btn-mic" class="karaoke-eq-btn" title="Enable microphone for real-time visualizations">🎙️ Enable Mic</button>
                </div>
            </div>
        </div>

        <div id="scoring-container" class="hidden">
            <h3>🎯 Score</h3>
            <div id="score-display">
                <span id="score-value">0</span><span id="score-total"> / 100</span>
            </div>
            <div id="pitch-indicator">🎵 Listening...</div>
            <div id="score-history"></div>
        </div>

        <div id="lyrics-container" class="hidden">
            <div id="lyrics-header">
                <h3>🎵 Lyrics</h3>
                <button id="btn-search-original" title="Search for original song on YouTube">🔍 Original</button>
            </div>
            <div id="lyrics-display"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="visualizer.js"></script>
    <script src="config.js"></script>
    <script src="pitchy.js"></script>
    <script src="app.js"></script>
</body>
</html>
